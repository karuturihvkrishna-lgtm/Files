<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday, Hanvitha ❤️</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!-- ══════════════════════════════════════
       COSMOS BACKGROUND CANVAS
  ══════════════════════════════════════ -->
  <canvas id="cosmos-canvas" aria-hidden="true"></canvas>

  <!-- ══════════════════════════════════════
       FIREWORKS CANVAS (celebration)
  ══════════════════════════════════════ -->
  <canvas id="fireworks-canvas" aria-hidden="true"></canvas>

  <!-- ══════════════════════════════════════
       SCENE 1 · LOADING
  ══════════════════════════════════════ -->
  <section id="scene-loading" class="scene active" aria-label="Loading">
    <p class="loading-tagline">A message crafted with love</p>
    <h1 class="loading-headline">Someone has a special message for you...</h1>
    <div id="countdown" aria-live="polite"></div>
  </section>

  <!-- ══════════════════════════════════════
       SCENE 2 · HEARTBEAT
  ══════════════════════════════════════ -->
  <section id="scene-heartbeat" class="scene" aria-label="Heartbeat">
    <div class="heart-icon" aria-hidden="true">❤️</div>
    <div class="heartbeat-line">
      <svg class="ecg-svg" viewBox="0 0 420 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path class="ecg-path"
          d="M0,30 L60,30 L75,30 L85,8 L95,52 L105,8 L115,30 L130,30
             L145,30 L155,8 L165,52 L175,8 L185,30 L200,30
             L215,30 L225,8 L235,52 L245,8 L255,30 L420,30"
        />
      </svg>
    </div>
  </section>

  <!-- ══════════════════════════════════════
       SCENE 3 · ENVELOPE
  ══════════════════════════════════════ -->
  <section id="scene-envelope" class="scene" aria-label="Open the envelope">
    <div class="envelope-wrapper" role="button" tabindex="0" aria-label="Click to open envelope">

      <!-- Flap (animates open) -->
      <div class="envelope-flap" aria-hidden="true"></div>

      <!-- Wax seal -->
      <div class="seal" aria-hidden="true">💌</div>

      <!-- Envelope body -->
      <div class="envelope-body" aria-hidden="true"></div>

      <!-- Hint text -->
      <p class="envelope-hint">tap to open</p>
    </div>
  </section>

  <!-- ══════════════════════════════════════
       SCENE 4 · LETTER
  ══════════════════════════════════════ -->
  <section id="scene-letter" class="scene" aria-label="Birthday letter">
    <div class="letter-scroll">
      <article class="letter-paper">

        <!-- Typewriter text target -->
        <p id="letter-body" aria-live="polite"></p>
